name: Publicacion diaria Senthia Core

on:
  schedule:
    # Horas en UTC. Verano en Espana (CEST = UTC+2), que es cuando corre el plan.
    - cron: "10 8 * * *"    # 10:10 Espana -> foto suelta
    - cron: "15 15 * * *"   # 17:15 Espana -> carrusel
  workflow_dispatch:
    inputs:
      type:
        description: "Tipo a publicar (single / carousel / vacio = ambos)"
        default: ""
      dry_run:
        description: "Probar sin publicar (true/false)"
        default: "false"
      catch_up:
        description: "Publicar todas las atrasadas (true/false)"
        default: "false"
      date:
        description: "Fecha 'hoy' simulada (YYYY-MM-DD, opcional)"
        default: ""

permissions:
  contents: write

concurrency:
  group: publicacion-senthia
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r automatizacion/requirements.txt

      - name: Publicar
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          IMAGE_BASE_URL:  ${{ secrets.IMAGE_BASE_URL }}
          GRAPH_VERSION:   v23.0
          SCHEDULE:        ${{ github.event.schedule }}
          IN_TYPE:         ${{ github.event.inputs.type }}
          IN_DRY:          ${{ github.event.inputs.dry_run }}
          IN_CATCHUP:      ${{ github.event.inputs.catch_up }}
          IN_DATE:         ${{ github.event.inputs.date }}
        run: |
          # Tipo segun la franja horaria (o segun input manual)
          TYPE="$IN_TYPE"
          if [ -z "$TYPE" ] && [ -n "$SCHEDULE" ]; then
            if [ "$SCHEDULE" = "15 15 * * *" ]; then TYPE="carousel"; else TYPE="single"; fi
          fi
          ARGS=""
          [ -n "$TYPE" ] && ARGS="$ARGS --type $TYPE"
          [ "$IN_DRY" = "true" ] && ARGS="$ARGS --dry-run"
          [ "$IN_CATCHUP" = "true" ] && ARGS="$ARGS --catch-up"
          [ -n "$IN_DATE" ] && ARGS="$ARGS --date $IN_DATE"
          echo "Ejecutando: python automatizacion/publish.py $ARGS"
          python automatizacion/publish.py $ARGS

      - name: Guardar plan.json actualizado
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if ! git diff --quiet -- plan.json; then
            git config user.name  "senthia-bot"
            git config user.email "bot@senthia.local"
            git add plan.json
            git commit -m "chore: marca publicacion del dia (posted:true) [skip ci]"
            git push
          else
            echo "Sin cambios en plan.json"
          fi
